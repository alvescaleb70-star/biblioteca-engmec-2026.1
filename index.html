<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biblioteca Engenharia Mecânica</title>

<!-- Fonte moderna -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: #0a0f1c; /* preto azulado */
    color: #e6edf3;
}

/* MENU SUPERIOR */
.menu {
    background-color: #111827;
    padding: 20px;
    text-align: center;
    position: fixed;
    width: 100%;
    top: 0;
    border-bottom: 2px solid #1f6feb;
}

.menu a {
    color: #c9d1d9;
    margin: 0 25px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.menu a:hover {
    color: #1f6feb;
}

/* BANNER */
.banner {
    padding: 140px 20px 60px 20px;
    text-align: center;
}

.banner h1 {
    font-size: 38px;
    color: #1f6feb;
}

.banner p {
    color: #8b949e;
}

/* SEÇÕES */
.section {
    padding: 60px 40px;
    text-align: center;
}

.section h2 {
    margin-bottom: 30px;
    color: #1f6feb;
}

/* CONTAINER DOS LIVROS */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

/* CARD DO LIVRO */
.livro {
    background: #161b22;
    padding: 20px;
    border-radius: 10px;
    width: 220px;
    transition: 0.3s;
    border: 1px solid #1f2937;
}

.livro:hover {
    transform: translateY(-8px);
    border-color: #1f6feb;
}

.livro img {
    width: 100%;
    border-radius: 6px;
}

.livro h3 {
    margin-top: 10px;
    font-size: 15px;
}

/* BOTÃO */
.livro a {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 16px;
    background-color: #1f6feb;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
    transition: 0.3s;
}

.livro a:hover {
    background-color: #388bfd;
}
</style>
</head>

<body>

<div class="menu">
    <a href="#calculo">Cálculo</a>
    <a href="#fisica">Física</a>
    <a href="#quimica">Química</a>
    <a href="#mecanica">Mecânica</a>
</div>

<div class="banner">
    <h1>📚 Biblioteca Engenharia Mecânica</h1>
    <p>Turma 2026</p>
</div>

<!-- CÁLCULO -->
<div class="section" id="calculo">
    <h2>📐 Cálculo</h2>
    <div class="container">

        <div class="livro">
            <img src="LINK_DA_IMAGEM">
            <h3>Nome do Livro</h3>
            <a href="LINK_DO_DRIVE" target="_blank">Acessar</a>
        </div>

    </div>
</div>

<!-- FÍSICA -->
<div class="section" id="fisica">
    <h2>⚙️ Física</h2>
    <div class="container"></div>
</div>

<!-- QUÍMICA -->
<div class="section" id="quimica">
    <h2>🧪 Química</h2>
    <div class="container"></div>
</div>

<!-- MECÂNICA -->
<div class="section" id="mecanica">
    <h2>🔧 Mecânica</h2>
    <div class="container"></div>
</div>

</body>
</html>
